services:
  - type: web
    name: trendpulse-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeploy: true

    envVars:
      - key: DATABASE_URL
        sync: false

      - key: ADMIN_SECRET
        sync: false

      - key: APP_ENV
        value: production

      - key: LOG_LEVEL
        value: INFO

      - key: ALLOWED_ORIGINS
        value: https://your-app.vercel.app